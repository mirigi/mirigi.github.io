title: Mirigi
description: Mirigi revolutionizes condominium living by offering a digital concierge service that enhances resident-building interactions. It provides luxury interfaces for various services like reservations, valet parking, and deliveries, accessible via mobile devices or in-wall touch panels. Mirigi empowers building staff to deliver exceptional service efficiently, streamlining operations and boosting productivity. With integration into building automation, residents enjoy unprecedented control over their living spaces, including security features. Discover the prestigious buildings that have adopted Mirigi for an elevated lifestyle experience.
##
baseurl: ""
url: "https://mirigi.com"
author: "Mirigi"
  #twitter_username: mirigi
logo: "/img/mirigi-logo.png"

# Twitter card — override jekyll-seo-tag default ("summary") so we emit only summary_large_image
twitter:
  card: summary_large_image

# SEO & Social Media
#social:
#  name: Mirigi Smart Concierge
#  links:
#    - https://twitter.com/mirigi
#    - https://www.linkedin.com/company/mirigi

# Locale settings
locale: en_US
timezone: America/New_York
exclude: ["README.md", "README.dev.md", "Gemfile", "Gemfile.lock", "node_modules", "package.json", "package-lock.json", "gulpfile.js", "Makefile", "Dockerfile", "*.sh", "*.fml", "error.log", "tulp", "_site_viejo", "docs", "A4_PRINT_FIX_GUIDE.md", "PROPOSAL_IMPLEMENTATION_SUMMARY.md", "PROPOSAL_QUICKSTART.md", "PROPOSAL_QUICK_REFERENCE.md", "PROPOSAL_SYSTEM.md", "SECURITY_AUDIT_REPORT.md", "SECURITY_BYPASS_DEMOS.md", "SECURITY_CHECKLIST.md", "SECURITY_EXECUTIVE_SUMMARY.md", "markdownFilesystem.md", "task.md"]
sass:
  sass_dir: scss/
# Fallback definitions:

lang: en
languages:
  - en
  - es
  - fr

# Demo-request modal → Google Sheet (Apps Script Web App URL).
# Paste the /exec URL from docs/demo-form-setup.md here. Leave empty to disable submit.
demo_form_endpoint: "https://script.google.com/macros/s/AKfycbzoc393pcHJWgMWt0ZHElqHeIaMJSt7SCpvKluSikGFmPAaEl355im4MM6tjkE_qqWj/exec"


collections:
  features:
    output: true
  customers:
    output: true

collections_dir: "collections"

# By default data is in english:
# ref: https://jekyllrb.com/docs/configuration/front-matter-defaults/
defaults:
  # Features collection:
  - scope:
      path: 'collections/_features/en'
      type: 'features'
    values:
      permalink: 'en/features/:title'
      lang: "en"
  - scope:
      path: 'collections/_features/es'
      type: 'features'
    values:
      permalink: 'es/funcionalidades/:title'
      lang: "es"
  - scope:
      path: 'collections/_features/fr'
      type: 'features'
    values:
      permalink: 'fr/caracteristiques/:title'
      lang: "fr"
  # customers collection:
  - scope:
      path: 'collections/_customers'
      type: 'customers'
    values:
      layout: customer
  - scope:
      path: 'collections/_customers/en'
      type: 'customers'
    values:
      permalink: 'en/customers/:title'
      lang: "en"
  - scope:
      path: 'collections/_customers/es'
      type: 'customers'
    values:
      permalink: 'es/clientes/:title'
      lang: "es"
  - scope:
      path: 'collections/_customers/fr'
      type: 'customers'
    values:
      permalink: 'fr/clients/:name'
      lang: "fr"
  # Translations
  - scope:
      path: "en/"
    values:
      lang: "en"
  - scope:
      path: "es/"
    values:
      lang: "es"
  - scope:
      path: "fr/"
    values:
      lang: "fr"
  # Exclude proposal pages from sitemap (internal sales tools)
  - scope:
      path: "proposal*.html"
    values:
      sitemap: false
  - scope:
      path: "*/proposal*.html"
    values:
      sitemap: false




#jekyll plugins for TOC and sitemap
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
  #- jekyll-toc
  - jekyll-sitemap
