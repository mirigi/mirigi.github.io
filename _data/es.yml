# FAQ — se muestra en el home y se refleja en el JSON-LD FAQPage.
# Agrupado en cuatro temas para cubrir todo el catálogo, con respuestas
# fundamentadas en las capacidades reales del producto.
faq_eyebrow: "Preguntas frecuentes"
faq:
  - title: "Sobre Mirigi"
    items:
      - q: "¿Qué es Mirigi?"
        a: "Mirigi es la plataforma de conserjería digital completa de un condominio de lujo — un solo sistema que permite a los residentes acceder a cada servicio y al personal operar cada función, todo bajo la marca del edificio. Cubre reservas, valet, entregas, acceso de visitantes, mantenimiento, automatización del edificio, expensas, reportes, encuestas y comunicaciones con residentes, a través de la app del residente, el panel táctil de la unidad y la consola del personal. En su centro está Miri, el primer agente conserje de IA que no solo responde — actúa por el residente, de punta a punta, en su idioma."
      - q: "¿En qué se diferencia Miri de un chatbot?"
        a: "Miri es un agente conserje de IA que actúa, no solo responde. El residente pide en lenguaje natural y Miri realiza el pedido, coordina el valet o reserva la amenidad de punta a punta, usando los mismos flujos que ya usa el personal del edificio todos los días."
      - q: "¿Sobre cuánta experiencia se construyó Mirigi?"
        a: "Nuestro equipo viene construyendo software de conserjería y automatización para propiedades residenciales de lujo desde 2003 — más de veinte años de aprendizaje operativo en toda América. Mirigi es la plataforma moderna que consolida esos años de flujos refinados, con la capa de conserje de IA sumada en la última generación. Los residentes obtienen una interfaz contemporánea; el edificio opera sobre fundamentos pulidos durante dos décadas."
      - q: "¿Dónde está Mirigi?"
        a: "Mirigi es un servicio global con oficinas en Miami (Florida), Montevideo (Uruguay) y Punta del Este (Uruguay). El equipo despliega conserjería de lujo en propiedades residenciales en cualquier parte del mundo — con experiencia concentrada en toda América y la madurez operativa para implementar edificios en cualquier mercado."
      - q: "¿Qué idiomas soporta Mirigi?"
        a: "Cada edificio puede usar el idioma que necesite. Las propiedades eligen un idioma por defecto, y cada residente puede elegir el suyo por encima — Mirigi traduce las comunicaciones al idioma del residente automáticamente. Ideal para residencias multilingües como las de Miami, donde conviven inglés, español, portugués y más bajo el mismo techo."
      - q: "¿Cómo cuida Mirigi la privacidad de los residentes?"
        a: "Los datos del residente están segmentados por rol y por unidad, de modo que cada usuario — residente, portero, valet, administrador — ve solo lo que necesita. Mirigi no vende ni comparte información de residentes, y la plataforma la opera directamente el equipo de Mirigi."

  - title: "Para residentes"
    items:
      - q: "¿Los residentes tienen que instalar una app?"
        a: "Mirigi se entrega con una app móvil de marca que la mayoría de los residentes usa y que recomendamos — es una de las formas principales de acceder al sistema. La plataforma también está disponible desde el panel táctil instalado en la unidad y desde un enlace web, así que instalarla en el teléfono no es estrictamente obligatorio. Muchas interacciones simplemente ocurren hablando con Miri."
      - q: "¿Cómo funcionan las reservas de amenidades?"
        a: "Los residentes ven un calendario en vivo de lo que está disponible — la parrilla, el spa, el salón de fiestas, el gimnasio — y reservan el horario que quieren en segundos. Las reservas se confirman al instante, los recordatorios salen automáticos y cualquier costo de uso se factura a la unidad. Miri también reserva por pedido."
      - q: "¿Cómo funciona la función de valet?"
        a: "El residente pide su auto desde la app, desde el panel táctil o pidiéndoselo a Miri antes de salir de la unidad, y sigue el estado en tiempo real. Mirigi avisa apenas el auto está listo en la entrada, y los invitados pueden pedir su propio auto después con un enlace o QR enviado por el equipo de valet."
      - q: "¿Qué pasa cuando llega un paquete?"
        a: "El personal de recepción registra la entrega con el courier y la unidad. El residente recibe una notificación instantánea por el canal que prefiera — push, bandeja de la app o email — con los detalles, y el paquete espera en la sala de almacenamiento del edificio hasta que lo retire. Varios paquetes por unidad se registran por separado."
      - q: "¿Se puede pedir comida desde Mirigi?"
        a: "Sí. Los residentes ven el menú completo del restaurante del edificio o de restaurantes asociados, eligen variantes del plato, realizan el pedido y siguen el estado en tiempo real desde la cocina hasta la entrega — todo desde la misma app. Miri también toma el pedido en conversación."
      - q: "¿Mirigi puede controlar mi hogar inteligente?"
        a: "Cuando el edificio tiene un controlador de hogar inteligente compatible, Mirigi se vincula con él para que los residentes manejen luces, clima, persianas y escenas desde la misma app. Miri puede ejecutar comandos y macros nombrados junto con todo lo demás que ya hace."

  - title: "Para la administración del edificio"
    items:
      - q: "¿La consola del personal de Mirigi es lo suficientemente sólida para operar una recepción activa?"
        a: "Sí — la operación de front-of-house es donde Mirigi empezó. La consola del personal es una cabina de operaciones en tiempo real refinada durante veinte años de operación de edificios, con vistas dedicadas para los equipos de recepción, conserjería, administración, seguridad, valet, mantenimiento y restaurante. Entregas pendientes, la cola del valet en vivo con código de color por tiempo de espera, invitados preautorizados, solicitudes abiertas y actividad reciente aterrizan en una sola pantalla, actualizada al instante en que algo cambia. Pensada primero para quienes abren la puerta — no es un producto de back-office con una pestaña de recepción agregada."
      - q: "¿Pueden los distintos miembros del personal ver cosas diferentes?"
        a: "Sí. Mirigi define el acceso de cada miembro del equipo por rol — recepción, conserjería, administrador, asistente de administración, seguridad, valet, jefe de valet, mantenimiento, personal de restaurante. Cada rol ve exactamente el trabajo que le corresponde, con un rastro de auditoría completo de quién hizo qué y cuándo. Roles y permisos se configuran por edificio, de modo que la propiedad decide cómo se estructura su operación."
      - q: "¿El equipo puede operar el edificio desde una tablet o un teléfono?"
        a: "Sí. La consola del personal funciona en navegador de escritorio en recepción, en tablet detrás del bar y en teléfono en la mano del técnico de mantenimiento. Las acciones sensibles están protegidas por autenticación de dos factores, y la interfaz es multilingüe para que el equipo en cada ciudad trabaje en su idioma."
      - q: "¿Cómo funciona la autorización de visitantes?"
        a: "Los residentes preautorizan invitados en segundos — nombre, fecha, horario recurrente si hace falta — y la recepción los recibe por nombre sin necesidad de una llamada. Las autorizaciones pueden ser por única vez o recurrentes, y el registro completo de llegadas es buscable por el personal."
      - q: "¿Cómo gestiona Mirigi las solicitudes de mantenimiento?"
        a: "Los residentes envían una solicitud de mantenimiento o servicio desde la misma app — describen el tema, eligen un horario, suben una foto si conviene. Las solicitudes se enrutan por categoría, se asignan al personal con niveles de prioridad, se escalan si no se atienden y se cierran con un registro que el residente puede revisar."
      - q: "¿Se pueden correr reportes sobre lo que pasa en el edificio?"
        a: "Sí. Los reportes de Mirigi son totalmente personalizables por edificio — cualquier pregunta que tus datos puedan responder, presentada como un gráfico claro en pantalla o descargable como planilla. Los grupos típicos son notificaciones, reservas, entregas, vehículos y solicitudes, y se ejecutan a demanda con los parámetros que importen."
      - q: "¿Los residentes pueden ver las cámaras del edificio?"
        a: "Cuando el edificio tiene cámaras IP instaladas, Mirigi trae los feeds seleccionados — área de piscina, lobby, frente al mar, entrada de garaje — a la misma app que los residentes ya usan. Cada cámara se configura por edificio con su propio nombre y reglas de visibilidad."
      - q: "¿Mirigi maneja anuncios, comunicados y encuestas?"
        a: "Sí. El módulo de comunicaciones sin papel envía anuncios y comunicados a los residentes por los canales que prefieran, con confirmaciones de lectura y segmentación por unidad. El módulo de encuestas corre votaciones con preguntas estructuradas y resultados agregados — útil para decisiones sobre amenidades, encuestas del consejo y consultas rápidas."
      - q: "¿Mirigi se integra con el sistema contable del edificio?"
        a: "Mirigi se conecta con la plataforma contable del administrador para que los residentes vean su saldo actual, recorran el historial de movimientos y paguen en línea. Los cargos generados dentro de Mirigi — cuotas de uso de amenidades, servicios — se envían automáticamente al sistema contable, eliminando la doble carga manual."

  - title: "Cómo empezar"
    items:
      - q: "¿La app puede llevar la marca del edificio?"
        a: "Sí. La app del residente, el panel táctil de la unidad y las notificaciones llevan el nombre, el logo y la identidad visual del edificio, y la propiedad puede publicarse como su propia app de marca en la App Store y Google Play. Cada edificio tiene su propio tema — sin experiencia genérica con marca Mirigi."
      - q: "¿Qué pasa en caso de pánico o emergencia?"
        a: "Los residentes disparan una alerta de pánico desde la misma app — incendio, seguridad o médica, con doble confirmación para evitar disparos accidentales. La alerta llega de inmediato a los roles del personal configurados para ese edificio, con la unidad, el nombre del residente y el contacto personal de emergencia, para que la respuesta esté coordinada desde el primer segundo."
      - q: "¿Cómo funciona la automatización del edificio?"
        a: "Una pasarela de automatización del edificio incorpora los sensores y controles existentes a Mirigi — temperatura de la piscina, luces del lobby, el portón de entrada, bombas de fuentes — para que residentes y personal actúen desde la misma app. Cualquier elemento conectado del edificio puede aparecer como una lectura para mirar de un vistazo o un botón para presionar, al lado de los mensajes y reservas."
      - q: "¿Mirigi se puede personalizar para nuestras necesidades?"
        a: "Sí. Más allá de los módulos estándar, Mirigi cotiza y desarrolla módulos a medida por propiedad — y se entregan dentro de la misma app de marca que los residentes ya usan todos los días. Páginas de información personalizadas, formularios de solicitud a medida, flujos específicos del edificio e integraciones son parte de la oferta."
      - q: "¿Cómo agendamos una demo?"
        a: "Use el botón Agendar demo en cualquier parte del sitio o escriba a info@mirigi.com. Coordinamos una demostración privada de 30 minutos a la medida de su propiedad — funciones reales funcionando, sin diapositivas, sin compromiso."

