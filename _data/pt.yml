# FAQ — exibida na página inicial e refletida no JSON-LD FAQPage.
# Agrupada em quatro temas para cobrir todo o catálogo, com respostas
# fundamentadas nas capacidades reais do produto.
faq_eyebrow: "Perguntas frequentes"
faq:
  - title: "Sobre o Mirigi"
    items:
      - q: "O que é o Mirigi?"
        a: "O Mirigi é a plataforma completa de concierge digital de um condomínio de luxo — um único sistema que permite aos moradores acessar cada serviço e à equipe operar cada função, tudo sob a marca do edifício. Abrange reservas, valet, entregas, acesso de visitantes, manutenção, automação do edifício, taxas condominiais, relatórios, enquetes e comunicações com os moradores, no app do morador, no painel tátil da unidade e no console da equipe. No centro está a Miri, o primeiro agente concierge com IA que não apenas responde — ela age pelo morador, de ponta a ponta, no idioma dele."
      - q: "Como a Miri se diferencia de um chatbot?"
        a: "A Miri é um agente concierge com IA que age, não apenas responde. O morador pede em linguagem natural e a Miri faz o pedido, coordena o valet ou reserva a área comum de ponta a ponta, usando os mesmos fluxos que a equipe do edifício já usa todos os dias."
      - q: "Sobre quanta experiência o Mirigi foi construído?"
        a: "Nossa equipe desenvolve software de concierge e automação predial para propriedades residenciais de luxo desde 2003 — mais de vinte anos de aprendizado operacional em todas as Américas. O Mirigi é a plataforma moderna que consolida esses anos de fluxos refinados, com a camada de concierge com IA acrescentada na última geração. Os moradores recebem uma interface contemporânea; o edifício opera sobre fundamentos aprimorados ao longo de duas décadas."
      - q: "Onde fica o Mirigi?"
        a: "O Mirigi é um serviço global, com escritórios em Miami (Flórida), Montevidéu (Uruguai) e Punta del Este (Uruguai). A equipe implanta concierge de luxo em propriedades residenciais em qualquer lugar do mundo — com experiência concentrada nas Américas e a maturidade operacional para integrar edifícios em qualquer mercado."
      - q: "Quais idiomas o Mirigi suporta?"
        a: "Cada edifício pode usar o idioma de que precisar. As propriedades escolhem um idioma padrão, e cada morador pode escolher o seu por cima dele — o Mirigi traduz as comunicações para o idioma do morador automaticamente. Ideal para residências multilíngues como as de Miami, onde convivem inglês, espanhol, português e mais sob o mesmo teto."
      - q: "Como o Mirigi cuida da privacidade dos moradores?"
        a: "Os dados do morador são segmentados por função e por unidade, de modo que cada usuário — morador, porteiro, valet, administrador — vê apenas o que precisa. O Mirigi não vende nem compartilha as informações dos moradores, e a plataforma é operada diretamente pela equipe do Mirigi."

  - title: "Para moradores"
    items:
      - q: "Os moradores precisam instalar um app?"
        a: "O Mirigi vem com um app de marca que a maioria dos moradores usa e que recomendamos — é uma das principais formas de acessar o sistema. A plataforma também está disponível em um painel tátil instalado na unidade e por um link na web, então instalar no celular não é estritamente obrigatório. Muitas interações acontecem simplesmente conversando com a Miri."
      - q: "Como funcionam as reservas de áreas comuns?"
        a: "Os moradores veem um calendário ao vivo do que está disponível — a churrasqueira, o spa, o salão de festas, a academia — e reservam o horário desejado em segundos. As reservas são confirmadas na hora, os lembretes saem automaticamente e qualquer taxa de uso é cobrada da unidade. A Miri também pode reservar a pedido."
      - q: "Como funciona o recurso de valet?"
        a: "Os moradores solicitam o carro pelo app, pelo painel tátil ou pela Miri antes de sair da unidade e, então, acompanham o status em tempo real. O Mirigi avisa no momento em que o carro está pronto na entrada, e os convidados podem chamar o próprio carro depois por um link ou QR code enviado pela equipe de valet."
      - q: "O que acontece quando uma encomenda chega?"
        a: "A equipe da recepção registra a entrega com o nome da transportadora e a unidade destinatária. O morador recebe uma notificação instantânea pelo canal de sua preferência — push, caixa de entrada do app ou e-mail — com os detalhes da entrega, e a encomenda aguarda na sala de armazenamento do edifício até a retirada. Várias encomendas por unidade são registradas individualmente."
      - q: "Posso pedir dos restaurantes do edifício pelo Mirigi?"
        a: "Sim. Os moradores navegam pelo menu completo do restaurante do edifício ou de restaurantes parceiros, escolhem as variantes do prato, fazem o pedido e acompanham o status em tempo real, da cozinha até a entrega — tudo no mesmo app. A Miri também recebe o pedido em conversa."
      - q: "O Mirigi pode controlar minha casa inteligente?"
        a: "Quando o edifício tem um controlador de casa inteligente compatível, o Mirigi se conecta a ele para que os moradores controlem luzes, climatização, persianas e cenas pelo mesmo app. A Miri pode acionar comandos e macros nomeados junto com tudo o mais que ela já faz."

  - title: "Para a administração do edifício"
    items:
      - q: "O console da equipe do Mirigi é robusto o suficiente para operar uma recepção movimentada de condomínio?"
        a: "Sim — a operação de recepção é onde o Mirigi começou. O console da equipe é uma cabine de operações em tempo real, refinada ao longo de vinte anos de operação de edifícios, com visões dedicadas para as equipes de recepção, concierge, administração, segurança, valet, manutenção e restaurante. Entregas pendentes, a fila de valet ao vivo com código de cores por tempo de espera, convidados pré-autorizados, solicitações abertas e atividade recente aparecem em uma única tela, atualizada no instante em que algo muda. Pensado primeiro para quem abre a porta — não um produto de back-office com uma aba de recepção acoplada."
      - q: "Membros diferentes da equipe podem ver coisas diferentes?"
        a: "Sim. O Mirigi define o acesso de cada membro da equipe por função — recepção, concierge, gerente, gerente assistente, segurança, valet, chefe de valet, manutenção, equipe de restaurante. Cada função vê exatamente o trabalho que lhe corresponde, com um registro de auditoria completo de quem fez o quê e quando. Funções e permissões são configuradas por edifício, de modo que a propriedade decide como sua operação é estruturada."
      - q: "A equipe pode operar o edifício pelo tablet ou pelo celular também?"
        a: "Sim. O console da equipe funciona no navegador de desktop na recepção, no tablet atrás do bar e no celular na mão do técnico de manutenção. As ações sensíveis são protegidas por autenticação de dois fatores, e a interface é multilíngue para que a equipe de cada cidade trabalhe em seu próprio idioma."
      - q: "Como funciona a autorização de visitantes?"
        a: "Os moradores pré-autorizam convidados em segundos — nome, data, horário recorrente se necessário — e a recepção os recebe pelo nome, sem nenhuma ligação. As autorizações podem ser de visita única ou recorrentes, e o registro completo de chegadas é pesquisável pela equipe."
      - q: "Como o Mirigi gerencia a manutenção e as solicitações de serviço?"
        a: "Os moradores abrem uma solicitação de manutenção ou serviço pelo mesmo app — descrevem o problema, escolhem um horário preferido, anexam uma foto se for útil. As solicitações são roteadas por categoria, atribuídas à equipe com níveis de prioridade, escaladas se não forem atendidas e encerradas com um registro que o morador pode revisar."
      - q: "Posso gerar relatórios sobre o que acontece no edifício?"
        a: "Sim. Os relatórios do Mirigi são totalmente personalizáveis por edifício — qualquer pergunta que seus dados possam responder, apresentada como um gráfico claro na tela ou baixada como planilha. Os grupos mais comuns incluem notificações, reservas, entregas, veículos e solicitações, e os relatórios são gerados sob demanda com os parâmetros que importam."
      - q: "Os moradores podem ver as câmeras do edifício?"
        a: "Quando o edifício tem câmeras IP instaladas, o Mirigi traz os feeds selecionados — área da piscina, lobby, orla, entrada da garagem — para o mesmo app que os moradores já usam. Cada câmera é configurada por edifício, com seu próprio nome e regras de visibilidade."
      - q: "O Mirigi pode gerenciar comunicados, avisos e enquetes com os moradores?"
        a: "Sim. O módulo de comunicações sem papel envia comunicados e avisos aos moradores pelos canais escolhidos, com confirmações de leitura e segmentação por unidade. O módulo de enquetes realiza votações com perguntas estruturadas e resultados agregados — útil para decisões sobre áreas comuns, votações do conselho e consultas rápidas."
      - q: "O Mirigi se integra ao sistema contábil do edifício?"
        a: "O Mirigi se conecta à plataforma contábil do administrador para que os moradores vejam o saldo atual, percorram o extrato completo e paguem online. Os lançamentos gerados dentro do Mirigi — taxas de uso de áreas comuns, serviços — são enviados de volta ao sistema contábil automaticamente, eliminando a digitação duplicada."

  - title: "Como começar"
    items:
      - q: "O app pode levar a identidade do nosso edifício?"
        a: "Sim. O app do morador, o painel tátil da unidade e as notificações levam o nome, o logotipo e a identidade visual do edifício, e a propriedade pode ser publicada como seu próprio app de marca na App Store e no Google Play. Cada edifício tem seu próprio tema — sem experiência genérica com a marca Mirigi."
      - q: "O que acontece em caso de pânico ou emergência?"
        a: "Os moradores acionam um alerta de pânico pelo mesmo app — incêndio, segurança ou médico, com confirmação em duas etapas para evitar acionamentos acidentais. O alerta chega imediatamente às funções da equipe configuradas para aquele edifício, levando a unidade, o nome do morador e qualquer contato pessoal de emergência, para que a resposta seja coordenada desde o primeiro segundo."
      - q: "Como funciona a automação do edifício?"
        a: "Um gateway de automação predial integra os sensores e controles existentes da propriedade ao Mirigi — temperatura da piscina, luzes do lobby, o portão de entrada, bombas das fontes — para que moradores e equipe ajam pelo mesmo app. Qualquer coisa conectada no edifício pode aparecer como uma leitura para conferir num relance ou um botão para pressionar, ao lado das mensagens e das reservas."
      - q: "O Mirigi pode ser personalizado para nossas necessidades específicas?"
        a: "Sim. Além dos módulos padrão, o Mirigi orça e desenvolve módulos sob medida por propriedade — e eles são entregues dentro do mesmo app de marca que os moradores já usam todos os dias. Páginas de informações personalizadas, formulários de solicitação sob medida, fluxos específicos do edifício e integrações fazem parte da oferta."
      - q: "Como agendamos uma demonstração?"
        a: "Use o botão Agendar demonstração em qualquer parte deste site ou escreva para info@mirigi.com. Reservaremos uma visita privada de 30 minutos sob medida para sua propriedade — funcionalidades reais em funcionamento, sem slides, sem compromisso."
