{% include header.html %}
{% include lang-image.html image=page.image lang=page.lang %}
<main>
  <style>
.feature-page.about-section { padding-top: 5rem; }
.feature-page .showcase > .image { flex: 1 1 50%; min-height: 55vh; }
.feature-page .showcase > .content { flex: 1 1 50%; background: white; }
  </style>

  <section class="about-section feature-page bg-light">
    <div class="container showcase bigimage ">
      {% if page.miniapp %}
        <div class="image miniapp-image">
          <iframe
            src="/miniapps/{{ page.miniapp }}/?lang={{ page.lang }}&size=large"
            class="miniapp-frame"
            frameborder="0" scrolling="no" allowtransparency="true">
          </iframe>
        </div>
      {% else %}
        <div class="image" style="background-image: url('{{resolved_image}}')">
        </div>
      {% endif %}
      <div class="content" id="content">
        <div>
          <div class="featured-text-right text-left text-lg-left">
            <h1 style="padding:1em 0 0 0" >{{page.title}}</h1>
            <div class="mb-0 text-black-50">
              <p>{{ content | markdownify }}</p>

            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>

{% include footer.html %}
