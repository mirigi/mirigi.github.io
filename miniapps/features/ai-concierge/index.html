<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miri – AI Concierge</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: transparent;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

/*
  Fixed perspective matching the reference image:
  Camera is slightly above and to the left of centre.
  Cards deeper in Z appear smaller and shift toward the upper-right,
  creating the diagonal cascade seen in the reference.
*/
#scene {
  width: 80%;
  height: 90%;
  perspective: 900px;
  perspective-origin: 30% 10%;
}

#stack {
  transform-style: preserve-3d;
  position: relative;
  width: 100%;
  height: 100%;
  /*
    Tilt the whole surface so it reads like the reference:
    rotateX tilts the surface back (top away, bottom toward viewer)
    rotateY turns it slightly so right side recedes
  */
  transform: rotateX(18deg) rotateY(-10deg);
}

.card {
  position: absolute;
  left: 0; right: 0; top: 0;
  background: #fff;
  border-radius: 18px;
  box-shadow: 0 8px 32px rgba(0,0,0,.18), 0 2px 8px rgba(0,0,0,.10);
  cursor: pointer;
  user-select: none;
  transform-origin: top center;
  will-change: transform, opacity;
}

/* Click bounce animation */
@keyframes bounce {
  0%   { transform: var(--base-transform) translateZ(0)     scale(1);    }
  35%  { transform: var(--base-transform) translateZ(30px)  scale(1.04); }
  65%  { transform: var(--base-transform) translateZ(-10px) scale(0.98); }
  100% { transform: var(--base-transform) translateZ(0)     scale(1);    }
}
.card--bounce {
  animation: bounce .5s ease forwards;
}

.card-header {
  display: flex; align-items: center; gap: 8px;
  padding: 11px 15px;
  border-bottom: 1px solid rgba(0,0,0,.06);
}
.card-icon     { font-size: 19px; line-height: 1; }
.card-scenario { font-size: 13px; font-weight: 700; color: #1c1c1e; }

.card-body {
  padding: 11px 15px 15px;
  display: flex; flex-direction: column; gap: 8px;
}
.msg-row        { display: flex; }
.msg-row--user  { justify-content: flex-end; }

.bubble {
  padding: 8px 12px;
  border-radius: 16px;
  font-size: 13px; line-height: 1.4;
  max-width: 82%; word-break: break-word;
}
.bubble--user {
  background: #007AFF; color: #fff;
  border-bottom-right-radius: 4px;
}
.bubble--miri {
  background: #f2f2f7; color: #1c1c1e;
  border-bottom-left-radius: 4px;
  min-height: 32px;
}

.thinking {
  display: none; align-items: center; gap: 4px;
  background: #f2f2f7;
  border-radius: 16px; border-bottom-left-radius: 4px;
  padding: 9px 13px; width: fit-content;
}
.dot {
  width: 7px; height: 7px;
  background: #8e8e93; border-radius: 50%;
  animation: blink 1.2s infinite ease-in-out;
}
.dot:nth-child(2) { animation-delay: .2s; }
.dot:nth-child(3) { animation-delay: .4s; }
@keyframes blink {
  0%,60%,100% { opacity:.2; transform:scale(.8); }
  30%         { opacity:1;  transform:scale(1.1); }
}

.miri-row { display:flex; flex-direction:column; align-items:flex-start; gap:2px; }
.miri-name {
  font-size: 10px; font-weight: 700;
  color: #8e8e93; letter-spacing: .06em;
  text-transform: uppercase; padding-left: 3px;
}
</style>
</head>
<body>
<div id="scene">
  <div id="stack"></div>
</div>

<script>
(function () {
  const params  = new URLSearchParams(location.search);
  const lang    = params.get('lang')  || 'en';
  const isSmall = (params.get('size') || 'large') === 'small';

  const CHAR_MS  = isSmall ? 0   : 34;
  const SPEED    = isSmall ? 0.5 : 1.0;
  const THINK_MS = Math.round(1400 * SPEED);
  const DWELL_MS = Math.round(2000 * SPEED);
  const PAUSE_MS = isSmall ? 0   : 650;

  /*
    3D positions for each stack slot.
    Slot 0 = active/front card (bottom-left in reference image, largest).
    Each step back: card moves right (+X), up (-Y), and into the screen (-Z).
    The perspective on #scene makes negative-Z cards appear smaller and higher.
  */
  const STEP_X =  isSmall ?  14 :  22;  // right per level
  const STEP_Y =  isSmall ? -32 : -52;  // up per level (negative = higher in 3D)
  const STEP_Z =  isSmall ? -60 : -95;  // into screen per level

  const stack = document.getElementById('stack');

  let items = [];  // [newest … oldest]
  let maxV  = 4;

  const esc   = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const sleep = ms => new Promise(r => setTimeout(r, ms));
  const raf   = ()  => new Promise(r => requestAnimationFrame(r));

  async function typeText(el, text) {
    if (!CHAR_MS) { el.textContent = text; return; }
    for (const ch of text) { el.textContent += ch; await sleep(CHAR_MS); }
  }

  function computeMax() {
    const h = document.getElementById('scene').offsetHeight;
    maxV = Math.max(2, Math.min(5, Math.round(h / 140)));
  }

  // Assign each card its 3D slot transform
  function reposition() {
    items.forEach((el, i) => {
      const tx = i * STEP_X;
      const ty = i * STEP_Y;
      const tz = i * STEP_Z;
      const t  = `translate3d(${tx}px,${ty}px,${tz}px)`;
      el.style.setProperty('--base-transform', t);
      el.style.transition = 'transform .55s cubic-bezier(.34,1.56,.64,1), opacity .4s ease';
      el.style.transform  = t;
      el.style.opacity    = String(Math.max(0.38, 1 - i * 0.22));
      el.style.zIndex     = String(30 - i);
    });
  }

  // Remove oldest cards that no longer fit
  function trim() {
    while (items.length > maxV) {
      const old = items.pop();
      old.style.transition = 'opacity .3s';
      old.style.opacity = '0';
      setTimeout(() => old.remove(), 300);
    }
  }

  function buildCard(item) {
    const el = document.createElement('div');
    el.className = 'card';
    el.innerHTML = `
      <div class="card-header">
        <span class="card-icon">${esc(item.icon)}</span>
        <span class="card-scenario">${esc(item.scenario)}</span>
      </div>
      <div class="card-body">
        <div class="msg-row msg-row--user"><div class="bubble bubble--user"></div></div>
        <div class="thinking" style="display:none">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div class="miri-row">
          <div class="miri-name" style="display:none">Miri</div>
          <div class="bubble bubble--miri"></div>
        </div>
      </div>`;

    // Click = bounce the card
    el.addEventListener('click', function () {
      el.classList.remove('card--bounce');
      void el.offsetWidth; // reflow to restart animation
      el.classList.add('card--bounce');
      el.addEventListener('animationend', () => el.classList.remove('card--bounce'), { once: true });
    });

    return el;
  }

  async function showCard(item, instant) {
    const el  = buildCard(item);
    const ub  = el.querySelector('.bubble--user');
    const th  = el.querySelector('.thinking');
    const mn  = el.querySelector('.miri-name');
    const mb  = el.querySelector('.bubble--miri');

    // Start: forward and below, invisible (will pop up into slot 0)
    el.style.transform  = `translate3d(0px, 80px, 160px)`;
    el.style.opacity    = '0';
    el.style.zIndex     = '99';
    el.style.transition = 'none';

    stack.appendChild(el);
    items.unshift(el);
    trim();

    await raf();

    if (instant) {
      ub.textContent = item.user;
      mn.style.display = 'block';
      mb.textContent = item.miri;
      reposition();
      return;
    }

    reposition();          // slide into slot 0, cascade others back
    await sleep(560);

    await typeText(ub, item.user);
    await sleep(PAUSE_MS);

    th.style.display = 'inline-flex';
    await sleep(THINK_MS);
    th.style.display = 'none';

    mn.style.display = 'block';
    await typeText(mb, item.miri);

    await sleep(DWELL_MS);
  }

  async function run(cards) {
    computeMax();
    window.addEventListener('resize', computeMax);

    await showCard(cards[0], true);

    let i = 1;
    while (true) {
      await showCard(cards[i % cards.length], false);
      i++;
    }
  }

  fetch(`data/${lang}.json`)
    .then(r => r.json())
    .then(run)
    .catch(err => {
      stack.innerHTML = `<div style="padding:20px;color:#c00;font-size:13px;">
        Failed to load data/${lang}.json<br>${err.message}</div>`;
    });
})();
</script>
</body>
</html>
