<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miri – AI Concierge</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { width: 100%; height: 100%; }

/*
  perspective MUST be on the direct parent of preserve-3d children.
  NEVER put overflow:hidden on a perspective container — it flattens 3D.
  perspective-origin at 65% -30% places the vanishing point upper-right,
  above the viewport — this is what creates the diagonal cascade where
  cards further back appear both higher AND to the right, matching the
  reference image.
*/
body {
  width: 100%; height: 100%;
  perspective: 600px;
  perspective-origin: 65% -30%;
  overflow: hidden;  /* only on body — outside preserve-3d chain */
  background:
    radial-gradient(ellipse 140% 110% at 40% 20%,
      #f9f9f9 0%, #ededeb 35%, #d9d9d5 100%);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  position: relative;
}

/*
  The tilted surface — rotateX(22deg) lifts the far end away from the viewer.
  transform-origin: bottom center keeps the near edge anchored at the bottom.
  Cards placed along the surface's Y axis appear at different depths,
  so perspective makes them progressively smaller and higher on screen.
*/
#stage {
  transform-style: preserve-3d;
  transform: rotateX(22deg);
  transform-origin: bottom center;
  position: absolute;
  bottom: 0;
  left: 50%;
  margin-left: -160px;
  width: 320px;
}

.card {
  position: absolute;
  bottom: 0; left: 0;
  width: 320px;
  background: rgba(255,255,255,0.97);
  border-radius: 18px;
  box-shadow: 0 10px 38px rgba(0,0,0,.16), 0 2px 8px rgba(0,0,0,.09);
  cursor: pointer;
  user-select: none;
  transform-origin: bottom center;
  will-change: transform, opacity;
  transition: transform .55s cubic-bezier(.34,1.56,.64,1), opacity .45s ease;
}

.card--bounce { animation: pop .42s ease forwards; }
@keyframes pop {
  0%   { transform: var(--t)                                    scale(1); }
  38%  { transform: var(--t) translateZ(22px) translateY(-4px)  scale(1.04); }
  72%  { transform: var(--t) translateZ(-5px)                   scale(0.98); }
  100% { transform: var(--t)                                    scale(1); }
}

.card-header {
  display: flex; align-items: center; gap: 8px;
  padding: 11px 14px;
  border-bottom: 1px solid rgba(0,0,0,.06);
}
.card-icon     { font-size: 18px; line-height: 1; flex-shrink: 0; }
.card-scenario { font-size: 13px; font-weight: 700; color: #1c1c1e; }

.card-body {
  padding: 10px 14px 14px;
  display: flex; flex-direction: column; gap: 8px;
}
.msg-row       { display: flex; }
.msg-row--user { justify-content: flex-end; }

.bubble {
  padding: 8px 12px;
  border-radius: 16px;
  font-size: 13px; line-height: 1.4;
  max-width: 78%; word-break: break-word;
}
.bubble--user {
  background: #007AFF; color: #fff;
  border-bottom-right-radius: 4px;
}
.bubble--miri {
  background: #f0f0f5; color: #1c1c1e;
  border-bottom-left-radius: 4px;
  min-height: 30px;
}

.thinking {
  display: none; align-items: center; gap: 4px;
  background: #f0f0f5;
  border-radius: 16px; border-bottom-left-radius: 4px;
  padding: 8px 12px; width: fit-content;
}
.dot {
  width: 7px; height: 7px;
  background: #8e8e93; border-radius: 50%;
  animation: blink 1.2s infinite ease-in-out;
}
.dot:nth-child(2) { animation-delay: .2s; }
.dot:nth-child(3) { animation-delay: .4s; }
@keyframes blink {
  0%,60%,100% { opacity:.25; transform:scale(.8); }
  30%         { opacity:1;   transform:scale(1.1); }
}
.miri-row { display:flex; flex-direction:column; align-items:flex-start; gap:2px; }
.miri-name {
  font-size: 10px; font-weight: 700;
  color: #8e8e93; letter-spacing: .06em;
  text-transform: uppercase; padding-left: 2px;
}
</style>
</head>
<body>
<div id="stage"></div>

<script>
(function () {
  const params  = new URLSearchParams(location.search);
  const lang    = params.get('lang')  || 'en';
  const isSmall = (params.get('size') || 'large') === 'small';

  const CHAR_MS  = isSmall ? 0   : 34;
  const SPEED    = isSmall ? 0.5 : 1.0;
  const THINK_MS = Math.round(1400 * SPEED);
  const DWELL_MS = Math.round(2000 * SPEED);
  const PAUSE_MS = isSmall ? 0   : 650;

  /*
    Each card sits STEP_Y pixels further up the tilted surface.
    rotateX(22°) maps Y→Z: each STEP_Y of -220px creates
    Z_depth = 220*sin(22°) ≈ 82px → scale = 600/(600+82) ≈ 0.88 per level.
    That matches the ~83% size reduction visible in ai-concierge.jpg.
    STEP_X adds the slight rightward drift of back cards.
  */
  const STEP_Y = isSmall ? -145 : -220;
  const STEP_X = isSmall ?   8  :   14;

  const stage = document.getElementById('stage');
  let items = [];
  let maxV  = isSmall ? 2 : 3;

  const esc   = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const sleep = ms => new Promise(r => setTimeout(r, ms));
  const raf   = ()  => new Promise(r => requestAnimationFrame(r));

  async function typeText(el, text) {
    if (!CHAR_MS) { el.textContent = text; return; }
    for (const ch of text) { el.textContent += ch; await sleep(CHAR_MS); }
  }

  function slotT(i) {
    return `translate3d(${i * STEP_X}px, ${i * STEP_Y}px, 0px)`;
  }

  function reposition() {
    items.forEach((el, i) => {
      const t = slotT(i);
      el.style.setProperty('--t', t);
      el.style.transform = t;
      el.style.opacity   = String(Math.max(0.5, 1 - i * 0.20));
      el.style.zIndex    = String(30 - i);
    });
  }

  function trim() {
    while (items.length > maxV) {
      const old = items.pop();
      old.style.transition = 'opacity .3s';
      old.style.opacity    = '0';
      setTimeout(() => old.remove(), 300);
    }
  }

  function buildCard(item) {
    const el = document.createElement('div');
    el.className = 'card';
    el.innerHTML = `
      <div class="card-header">
        <span class="card-icon">${esc(item.icon)}</span>
        <span class="card-scenario">${esc(item.scenario)}</span>
      </div>
      <div class="card-body">
        <div class="msg-row msg-row--user"><div class="bubble bubble--user"></div></div>
        <div class="thinking" style="display:none">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div class="miri-row">
          <div class="miri-name" style="display:none">Miri</div>
          <div class="bubble bubble--miri"></div>
        </div>
      </div>`;
    el.addEventListener('click', () => {
      el.classList.remove('card--bounce');
      void el.offsetWidth;
      el.classList.add('card--bounce');
      el.addEventListener('animationend', () => el.classList.remove('card--bounce'), { once: true });
    });
    return el;
  }

  async function showCard(item, instant) {
    const el = buildCard(item);
    const ub = el.querySelector('.bubble--user');
    const th = el.querySelector('.thinking');
    const mn = el.querySelector('.miri-name');
    const mb = el.querySelector('.bubble--miri');

    // Start below — slides up the tilted surface into slot 0
    el.style.transform  = `translate3d(0px, 80px, 0px)`;
    el.style.opacity    = '0';
    el.style.zIndex     = '99';
    el.style.transition = 'none';

    stage.appendChild(el);
    items.unshift(el);
    trim();

    await raf();

    if (instant) {
      ub.textContent   = item.user;
      mn.style.display = 'block';
      mb.textContent   = item.miri;
      reposition();
      return;
    }

    reposition();
    await sleep(560);

    await typeText(ub, item.user);
    await sleep(PAUSE_MS);

    th.style.display = 'inline-flex';
    await sleep(THINK_MS);
    th.style.display = 'none';

    mn.style.display = 'block';
    await typeText(mb, item.miri);

    await sleep(DWELL_MS);
  }

  async function run(cards) {
    await showCard(cards[0], true);
    let i = 1;
    while (true) { await showCard(cards[i++ % cards.length], false); }
  }

  fetch(`data/${lang}.json`)
    .then(r => r.json())
    .then(run)
    .catch(err => {
      stage.innerHTML = `<div style="padding:20px;color:#c00;font-size:13px;">
        Failed to load data/${lang}.json<br>${err.message}</div>`;
    });
})();
</script>
</body>
</html>
