<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miri – AI Concierge</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body { width: 100%; height: 100%; }

/*
  CSS 3D pipeline: body (perspective) → #stage (preserve-3d) → .card (translate3d).
  #stage must be a DIRECT child of body — any intermediate element flattens the chain.
  Each card is individually rotated (rotateX + rotateY) for the top-right viewpoint;
  the stage itself is never rotated so the stack arrangement stays screen-straight.
*/
body {
  perspective: 1600px;
  perspective-origin: 50% 50%;
  background: #e8e8e6 url('bg.jpg') top center / cover no-repeat;
  background-attachment: local;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  overflow: hidden;
}

#stage {
  position: absolute;
  inset: 0;
  transform-style: preserve-3d;
}

.card {
  --card-w: clamp(200px, 85vw, 320px);
  position: absolute;
  left: 50%;
  margin-left: calc(var(--card-w) * -0.5);
  bottom: 0;
  width: var(--card-w);
  border-radius: 24px;
  background: linear-gradient(180deg, rgba(255,255,255,.82) 0%, rgba(247,250,255,.68) 100%);
  border: 1px solid rgba(255,255,255,.85);
  backdrop-filter: blur(22px) saturate(140%);
  -webkit-backdrop-filter: blur(22px) saturate(140%);
  box-shadow:
    0 45px 55px -10px rgba(40,55,85,.45),
    0 25px 40px -12px rgba(40,55,85,.30),
    0 12px 22px rgba(102,118,145,.18),
    0 3px 8px rgba(34,51,84,.10),
    inset 0 1px 0 rgba(255,255,255,.95),
    inset 0 -1px 0 rgba(255,255,255,.35);
  overflow: hidden;
  cursor: pointer;
  user-select: none;
  transform-origin: 50% 50%;
  transition: transform .55s cubic-bezier(.34,1.56,.64,1), opacity .45s ease;
  backface-visibility: hidden;
}

/* Diagonal gloss sweep */
.card::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    135deg,
    rgba(255,255,255,.65) 0%,
    rgba(255,255,255,.08) 30%,
    rgba(255,255,255,0)   45%
  );
  pointer-events: none;
  z-index: 2;
}

/* Top-left soft highlight */
.card::after {
  content: "";
  position: absolute;
  top: 8px; left: 12px;
  width: 45%; height: 22%;
  background: radial-gradient(ellipse at top left,
    rgba(255,255,255,.65), rgba(255,255,255,0) 70%);
  filter: blur(6px);
  pointer-events: none;
  z-index: 2;
}

.card-header, .card-subtitle, .card-body { position: relative; z-index: 3; }

/*
  Bounce: pop forward in Z then settle back. Uses the slot transform via
  the --t custom property so the bounce respects the card's slot position.
*/
.card--bounce { animation: pop .45s ease forwards; }
@keyframes pop {
  0%   { transform: var(--t); }
  40%  { transform: var(--t) translateZ(60px); }
  72%  { transform: var(--t) translateZ(-10px); }
  100% { transform: var(--t); }
}

.card-header {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 16px 10px;
  border-bottom: 1px solid rgba(0,0,0,.05);
}
.card-icon     { font-size: 22px; line-height: 1; flex-shrink: 0; }
.card-scenario { font-size: 17px; font-weight: 700; color: #1c1c1e; letter-spacing: -0.01em; }

.card-subtitle {
  font-size: 13px; color: #8e8e93; font-weight: 500;
  padding: 0 16px 8px; margin-top: -6px;
}

.card-body {
  padding: 10px 14px 14px;
  display: flex; flex-direction: column; gap: 6px;
  min-height: 170px;
}

.msg-label {
  font-size: 11px; font-weight: 700; color: #8e8e93;
  letter-spacing: .08em; text-transform: uppercase;
  padding: 0 4px;
}
.msg-label--right { text-align: right; }

.msg-row       { display: flex; }
.msg-row--user { justify-content: flex-end; }

.bubble {
  padding: 10px 13px;
  border-radius: 16px;
  font-size: 16px; line-height: 1.35;
  max-width: 86%; word-break: break-word;
  box-shadow:
    0 8px 18px rgba(34,51,84,.08),
    0 2px 6px rgba(34,51,84,.06);
}
.bubble--user {
  background: linear-gradient(180deg, #1f7cff 0%, #1970ea 100%);
  color: #fff;
  border-top-right-radius: 6px;
  border-bottom-right-radius: 16px;
}
.bubble--miri {
  background: rgba(255,255,255,.92);
  color: #242932;
  border: 1px solid rgba(255,255,255,.9);
  border-top-left-radius: 6px;
  border-bottom-left-radius: 16px;
}

.thinking {
  display: none; align-items: center; gap: 4px;
  background: rgba(255,255,255,.92);
  border: 1px solid rgba(255,255,255,.9);
  border-radius: 16px; border-top-left-radius: 6px;
  padding: 10px 13px; width: fit-content;
  box-shadow: 0 8px 18px rgba(34,51,84,.08), 0 2px 6px rgba(34,51,84,.06);
}
.dot {
  width: 7px; height: 7px;
  background: #8e8e93; border-radius: 50%;
  animation: blink 1.2s infinite ease-in-out;
}
.dot:nth-child(2) { animation-delay: .2s; }
.dot:nth-child(3) { animation-delay: .4s; }
@keyframes blink {
  0%,60%,100% { opacity:.25; transform:scale(.8); }
  30%         { opacity:1;   transform:scale(1.1); }
}
</style>
</head>
<body>
<div id="stage"></div>

<script>
(function () {
  const params  = new URLSearchParams(location.search);
  const lang    = params.get('lang')  || 'en';
  const isSmall = (params.get('size') || 'large') === 'small';

  const CHAR_MS  = isSmall ? 22  : 34;
  const SPEED    = isSmall ? 0.5 : 1.0;
  const THINK_MS = Math.round(1400 * SPEED);
  const DWELL_MS = Math.round(2000 * SPEED);
  const PAUSE_MS = isSmall ? 0   : 650;

  const STEP_X = isSmall ?  18 :  28;
  const STEP_Y = isSmall ? -105 : -180;
  const STEP_Z = isSmall ? -60 : -90;

  const BASE_X = isSmall ? 10 : 20;
  const BASE_Y = isSmall ? -15 : -25;

  const FADE_OUT_MS = 300; // must match the opacity/transform transition duration in trim()

  const stage = document.getElementById('stage');
  let items = [];
  const MIN_V = 3;
  const MAX_V = 5;

  // Pause animation when tab is hidden or iframe scrolls out of view.
  let paused = false;
  const waitIfPaused = async () => { while (paused) await sleep(200); };
  document.addEventListener('visibilitychange', () => { paused = document.hidden; });
  if (window.frameElement) {
    new IntersectionObserver(([entry]) => { paused = !entry.isIntersecting; }, { threshold: 0.01 })
      .observe(window.frameElement);
  }

  const esc   = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const sleep = ms => new Promise(r => setTimeout(r, ms));
  const raf   = ()  => new Promise(r => requestAnimationFrame(r));

  async function typeText(el, text) {
    if (!CHAR_MS) { el.textContent = text; return; }
    for (const ch of text) { el.textContent += ch; await sleep(CHAR_MS); }
  }

  /*
    Per-card rotation — every card looks like it's being viewed from the
    top-right corner. Same rotation for all cards so the stack arrangement
    stays straight on-screen (as requested).
    rotateX(-12deg): tilts the top slightly toward viewer (so top face is visible)
    rotateY(-22deg): tilts the right edge away (so left face is visible)
    This is the technique from the 3D card effect tutorial.
  */
  const TILT = `rotateX(-12deg) rotateY(-22deg)`;

  function slotT(i) {
    const x = BASE_X + i * STEP_X;
    const y = BASE_Y + i * STEP_Y;
    const z = i * STEP_Z;
    return `translate3d(${x}px, ${y}px, ${z}px) ${TILT}`;
  }

  function reposition() {
    items.forEach((el, i) => {
      const t = slotT(i);
      el.style.setProperty('--t', t);
      el.style.transform = t;
      el.style.opacity   = String(Math.max(0.85, 1 - i * 0.05));
      el.style.zIndex    = String(30 - i);
    });
  }

  function trim() {
    while (items.length > MAX_V) {
      const old = items.pop();
      old._cancelDrag?.();
      old.style.transition = `opacity ${FADE_OUT_MS}ms, transform ${FADE_OUT_MS}ms`;
      old.style.opacity    = '0';
      setTimeout(() => old.remove(), FADE_OUT_MS);
    }
  }

  /* Drag-to-throw: grab, fling, then snap back to slot.
     Pure click (no movement beyond a small threshold) just triggers the
     bounce animation, preserving the old tap feedback. */
  function attachDrag(el) {
    const TRANS_RETURN = 'transform .6s cubic-bezier(.34,1.56,.64,1), opacity .45s ease';
    const DRAG_THRESHOLD = 4;                // px before we consider it a drag
    let active = false, dragging = false;
    let sx = 0, sy = 0, dx = 0, dy = 0;
    let lx = 0, ly = 0, lt = 0, vx = 0, vy = 0;
    let moveHandler, upHandler;

    const getSlotT = () => el.style.getPropertyValue('--t') || '';

    const down = (e) => {
      const pt = e.touches ? e.touches[0] : e;
      active = true; dragging = false;
      sx = lx = pt.clientX;
      sy = ly = pt.clientY;
      dx = dy = vx = vy = 0;
      lt = performance.now();
      document.addEventListener('mousemove', moveHandler);
      document.addEventListener('mouseup',   upHandler);
      document.addEventListener('touchmove', moveHandler, { passive: false });
      document.addEventListener('touchend',  upHandler);
      document.addEventListener('touchcancel', upHandler);
    };

    moveHandler = (e) => {
      if (!active) return;
      const pt = e.touches ? e.touches[0] : e;
      const nx = pt.clientX - sx;
      const ny = pt.clientY - sy;
      if (!dragging && Math.hypot(nx, ny) < DRAG_THRESHOLD) return;
      if (!dragging) {
        dragging = true;
        el.style.transition = 'none';
        el.style.zIndex = '99';
      }
      if (e.cancelable) e.preventDefault();
      const now = performance.now();
      const dt = Math.max(1, now - lt);
      vx = (pt.clientX - lx) / dt * 16;  // px per ~frame
      vy = (pt.clientY - ly) / dt * 16;
      dx = nx; dy = ny;
      lx = pt.clientX; ly = pt.clientY; lt = now;
      el.style.transform = `${getSlotT()} translate(${dx}px, ${dy}px)`;
    };

    const removeDragListeners = () => {
      document.removeEventListener('mousemove', moveHandler);
      document.removeEventListener('mouseup',   upHandler);
      document.removeEventListener('touchmove', moveHandler);
      document.removeEventListener('touchend',  upHandler);
      document.removeEventListener('touchcancel', upHandler);
    };

    upHandler = () => {
      if (!active) return;
      active = false;
      removeDragListeners();

      if (!dragging) {
        // Treat as tap: replay the bounce animation.
        el.classList.remove('card--bounce');
        void el.offsetWidth;
        el.classList.add('card--bounce');
        el.addEventListener('animationend',
          () => el.classList.remove('card--bounce'), { once: true });
        return;
      }

      // Throw: extend along the release velocity, then snap home.
      const throwX = dx + vx * 10;
      const throwY = dy + vy * 10;
      el.style.transition = 'transform .24s cubic-bezier(.2,.8,.3,1)';
      el.style.transform  = `${getSlotT()} translate(${throwX}px, ${throwY}px)`;

      const onEnd = () => {
        el.removeEventListener('transitionend', onEnd);
        el.style.transition = TRANS_RETURN;
        el.style.transform  = getSlotT();
      };
      el.addEventListener('transitionend', onEnd, { once: true });
    };

    el._cancelDrag = () => { if (active) { active = false; removeDragListeners(); } };

    el.addEventListener('mousedown',  down);
    el.addEventListener('touchstart', down, { passive: true });
    el.addEventListener('dragstart', (e) => e.preventDefault());
  }

  function buildCard(item) {
    const el = document.createElement('div');
    el.className = 'card';
    el.innerHTML = `
      <div class="card-header">
        <span class="card-scenario">${esc(item.scenario)}</span>
        <span class="card-icon" style="margin-left:auto">${esc(item.icon)}</span>
      </div>
      <div class="card-body">
        <div class="msg-label msg-label--right">User</div>
        <div class="msg-row msg-row--user" style="display:none"><div class="bubble bubble--user"></div></div>
        <div class="msg-label msg-label--miri" style="display:none">Miri</div>
        <div class="thinking">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div class="msg-row msg-row--miri" style="display:none"><div class="bubble bubble--miri"></div></div>
      </div>`;
    attachDrag(el);
    return el;
  }

  async function showCard(item, instant) {
    const el = buildCard(item);
    const ub = el.querySelector('.bubble--user');
    const ur = el.querySelector('.msg-row--user');
    const th = el.querySelector('.thinking');
    const mb = el.querySelector('.bubble--miri');
    const mr = el.querySelector('.msg-row--miri');
    const ml = el.querySelector('.msg-label--miri');

    /* Start below the front slot (slides up into place). */
    const startT = `translate3d(${BASE_X}px, ${BASE_Y + 120}px, 0px)`;
    el.style.setProperty('--t', startT);
    el.style.transform  = startT;
    el.style.opacity    = '0';
    el.style.zIndex     = '99';
    el.style.transition = 'none';

    stage.appendChild(el);
    items.unshift(el);
    trim();

    /* Force a reflow so the "start" transform is committed before we
       re-enable transitions and move it to slot 0. */
    void el.offsetWidth;
    el.style.transition = '';
    await raf();

    if (instant) {
      ur.style.display = '';
      ub.textContent = item.user;
      ml.style.display = '';
      mr.style.display = '';
      mb.textContent = item.miri;
      reposition();
      return;
    }

    reposition();
    await sleep(560);

    ur.style.display = '';           // display change forces Safari layer flush before typing
    await typeText(ub, item.user);
    await sleep(PAUSE_MS);

    ml.style.display = '';
    th.style.display = 'inline-flex';
    await sleep(THINK_MS);
    th.style.display = 'none';

    mr.style.display = '';           // display change forces Safari layer flush before typing
    await typeText(mb, item.miri);

    await sleep(DWELL_MS);
  }

  async function run(cards) {
    /* Pre-populate MIN_V-1 cards instantly so that the moment the first
       animated typing card appears, the on-screen total is already MIN_V.
       That guarantees "at least 3 cards at every moment". */
    for (let k = 0; k < MIN_V - 1; k++) {
      await showCard(cards[k % cards.length], true);
    }
    let i = MIN_V - 1;
    while (true) { await waitIfPaused(); await showCard(cards[i++ % cards.length], false); }
  }

  fetch(`data/${lang}.json`)
    .then(r => r.json())
    .then(run)
    .catch(err => {
      stage.innerHTML = `<div style="padding:20px;color:#c00;font-size:13px;">
        Failed to load data/${lang}.json<br>${err.message}</div>`;
    });
})();
</script>
</body>
</html>
