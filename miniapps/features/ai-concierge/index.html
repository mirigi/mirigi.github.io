<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miri – AI Concierge</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body { width: 100%; height: 100%; }

/*
  CSS 3D pipeline:
    body (perspective)
      └─ #stage (transform-style: preserve-3d, rotateX(30deg))
           └─ .card (translate3d per slot)

  CRITICAL: #stage must be a DIRECT child of the perspective element.
  Any intermediate element inherits transform-style: flat by default,
  which flattens the 3D chain and kills the rotateX on #stage.
  The iframe itself clips content, so no intermediate overflow:hidden
  wrapper is needed.
*/
body {
  /*
    Camera: view from ~30° above, slightly off to the right.
    perspective=700px with rotateX(30deg) on the stage gives a strong
    top-down-at-an-angle viewpoint matching ai-concierge.jpg.
  */
  perspective: 700px;
  perspective-origin: 65% 20%;
  background:
    radial-gradient(ellipse 120% 90% at 30% 25%, #fafafa 0%, #ececea 45%, #d4d4d0 100%);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  overflow: hidden;
}

/*
  #stage is a direct child of body so the perspective propagates correctly
  (any intermediate element with the default transform-style: flat would
  flatten the 3D chain and kill rotateX).

  rotateX(30deg) tilts the top of the stage AWAY from the viewer while
  the bottom (transform-origin: 50% 100%) stays anchored at the viewer.
  Cards placed along Y=0 at the bottom are closest; cards at Y=−N appear
  further back (up the tilted plane) and the perspective automatically
  foreshortens them smaller and shifts them toward the vanishing point.
*/
#stage {
  position: absolute;
  inset: 0;
  transform-style: preserve-3d;
  transform: rotateX(30deg);
  transform-origin: 50% 100%;
}

.card {
  position: absolute;
  /*
    Anchor: bottom-left area. Front card sits near bottom-left; successive
    cards translate UP and RIGHT (and back in Z) to form the cascade.
    The card's own transform-origin is its center so scale is symmetric.
  */
  left: 0;
  bottom: 0;
  width: 320px;
  background: #ffffff;
  border-radius: 18px;
  box-shadow:
    0 18px 40px rgba(0,0,0,.18),
    0 4px 12px rgba(0,0,0,.10),
    0 1px 2px rgba(0,0,0,.06);
  cursor: pointer;
  user-select: none;
  transform-origin: 50% 50%;
  will-change: transform, opacity;
  transition: transform .55s cubic-bezier(.34,1.56,.64,1), opacity .45s ease;
  backface-visibility: hidden;
}

/*
  Bounce: pop forward in Z then settle back. Uses the slot transform via
  the --t custom property so the bounce respects the card's slot position.
*/
.card--bounce { animation: pop .45s ease forwards; }
@keyframes pop {
  0%   { transform: var(--t); }
  40%  { transform: var(--t) translateZ(60px); }
  72%  { transform: var(--t) translateZ(-10px); }
  100% { transform: var(--t); }
}

.card-header {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 16px 10px;
  border-bottom: 1px solid rgba(0,0,0,.05);
}
.card-icon     { font-size: 18px; line-height: 1; flex-shrink: 0; }
.card-scenario { font-size: 14px; font-weight: 700; color: #1c1c1e; letter-spacing: -0.01em; }

.card-subtitle {
  font-size: 11px; color: #8e8e93; font-weight: 500;
  padding: 0 16px 8px; margin-top: -6px;
}

.card-body {
  padding: 10px 14px 14px;
  display: flex; flex-direction: column; gap: 6px;
}

.msg-label {
  font-size: 9px; font-weight: 700; color: #8e8e93;
  letter-spacing: .08em; text-transform: uppercase;
  padding: 0 4px;
}
.msg-label--right { text-align: right; }

.msg-row       { display: flex; }
.msg-row--user { justify-content: flex-end; }

.bubble {
  padding: 8px 12px;
  border-radius: 16px;
  font-size: 13px; line-height: 1.4;
  max-width: 80%; word-break: break-word;
}
.bubble--user {
  background: #007AFF; color: #fff;
  border-bottom-right-radius: 4px;
}
.bubble--miri {
  background: #f0f0f3; color: #1c1c1e;
  border-bottom-left-radius: 4px;
  min-height: 30px;
}

.thinking {
  display: none; align-items: center; gap: 4px;
  background: #f0f0f3;
  border-radius: 16px; border-bottom-left-radius: 4px;
  padding: 8px 12px; width: fit-content;
}
.dot {
  width: 7px; height: 7px;
  background: #8e8e93; border-radius: 50%;
  animation: blink 1.2s infinite ease-in-out;
}
.dot:nth-child(2) { animation-delay: .2s; }
.dot:nth-child(3) { animation-delay: .4s; }
@keyframes blink {
  0%,60%,100% { opacity:.25; transform:scale(.8); }
  30%         { opacity:1;   transform:scale(1.1); }
}
</style>
</head>
<body>
<div id="stage"></div>

<script>
(function () {
  const params  = new URLSearchParams(location.search);
  const lang    = params.get('lang')  || 'en';
  const isSmall = (params.get('size') || 'large') === 'small';

  const CHAR_MS  = isSmall ? 0   : 34;
  const SPEED    = isSmall ? 0.5 : 1.0;
  const THINK_MS = Math.round(1400 * SPEED);
  const DWELL_MS = Math.round(2000 * SPEED);
  const PAUSE_MS = isSmall ? 0   : 650;

  /*
    Cascade geometry. The stage is tilted with rotateX(30deg) so Y
    translation ALONE creates Z depth:
      Z_from_rotation = STEP_Y * sin(30°) ≈ STEP_Y * 0.5
    With STEP_Y = -240, each step contributes ~120px of Z depth,
    plus explicit STEP_Z adds more. With perspective=700px, the combined
    depth of ~150px per step yields scale ≈ 700/(700+150) ≈ 0.82 per step,
    matching the reference's ~83% size ratio.

    STEP_X: slight rightward drift (the reference cards also drift right
    as they recede because the perspective-origin is off-centre right).
  */
  const STEP_X = isSmall ?  24 :  38;
  const STEP_Y = isSmall ? -145 : -240;
  const STEP_Z = isSmall ? -30 : -40;

  /* Front-card offset from the viewport's bottom-left corner. */
  const BASE_X = isSmall ? 10 : 18;
  const BASE_Y = isSmall ? -10 : -20;

  const stage = document.getElementById('stage');
  let items = [];
  let maxV  = isSmall ? 2 : 3;

  const esc   = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const sleep = ms => new Promise(r => setTimeout(r, ms));
  const raf   = ()  => new Promise(r => requestAnimationFrame(r));

  async function typeText(el, text) {
    if (!CHAR_MS) { el.textContent = text; return; }
    for (const ch of text) { el.textContent += ch; await sleep(CHAR_MS); }
  }

  function slotT(i) {
    const x = BASE_X + i * STEP_X;
    const y = BASE_Y + i * STEP_Y;
    const z = i * STEP_Z;
    return `translate3d(${x}px, ${y}px, ${z}px)`;
  }

  function reposition() {
    items.forEach((el, i) => {
      const t = slotT(i);
      el.style.setProperty('--t', t);
      el.style.transform = t;
      el.style.opacity   = String(Math.max(0.55, 1 - i * 0.18));
      el.style.zIndex    = String(30 - i);
    });
  }

  function trim() {
    while (items.length > maxV) {
      const old = items.pop();
      old.style.transition = 'opacity .3s, transform .3s';
      old.style.opacity    = '0';
      setTimeout(() => old.remove(), 300);
    }
  }

  function buildCard(item) {
    const el = document.createElement('div');
    el.className = 'card';
    el.innerHTML = `
      <div class="card-header">
        <span class="card-scenario">${esc(item.scenario)}</span>
        <span class="card-icon" style="margin-left:auto">${esc(item.icon)}</span>
      </div>
      <div class="card-body">
        <div class="msg-label msg-label--right">User</div>
        <div class="msg-row msg-row--user"><div class="bubble bubble--user"></div></div>
        <div class="msg-label">Miri</div>
        <div class="thinking">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div class="msg-row"><div class="bubble bubble--miri"></div></div>
      </div>`;
    el.addEventListener('click', () => {
      el.classList.remove('card--bounce');
      void el.offsetWidth;
      el.classList.add('card--bounce');
      el.addEventListener('animationend',
        () => el.classList.remove('card--bounce'), { once: true });
    });
    return el;
  }

  async function showCard(item, instant) {
    const el = buildCard(item);
    const ub = el.querySelector('.bubble--user');
    const th = el.querySelector('.thinking');
    const mb = el.querySelector('.bubble--miri');

    /* Start below the front slot (slides up into place). */
    const startT = `translate3d(${BASE_X}px, ${BASE_Y + 120}px, 0px)`;
    el.style.setProperty('--t', startT);
    el.style.transform  = startT;
    el.style.opacity    = '0';
    el.style.zIndex     = '99';
    el.style.transition = 'none';

    stage.appendChild(el);
    items.unshift(el);
    trim();

    /* Force a reflow so the "start" transform is committed before we
       re-enable transitions and move it to slot 0. */
    void el.offsetWidth;
    el.style.transition = '';
    await raf();

    if (instant) {
      ub.textContent = item.user;
      mb.textContent = item.miri;
      reposition();
      return;
    }

    reposition();
    await sleep(560);

    await typeText(ub, item.user);
    await sleep(PAUSE_MS);

    th.style.display = 'inline-flex';
    await sleep(THINK_MS);
    th.style.display = 'none';

    await typeText(mb, item.miri);

    await sleep(DWELL_MS);
  }

  async function run(cards) {
    await showCard(cards[0], true);
    let i = 1;
    while (true) { await showCard(cards[i++ % cards.length], false); }
  }

  fetch(`data/${lang}.json`)
    .then(r => r.json())
    .then(run)
    .catch(err => {
      stage.innerHTML = `<div style="padding:20px;color:#c00;font-size:13px;">
        Failed to load data/${lang}.json<br>${err.message}</div>`;
    });
})();
</script>
</body>
</html>
