<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miri – AI Concierge</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

body {
  background:
    radial-gradient(ellipse 130% 100% at 42% 22%,
      #f9f9f9 0%, #ededed 38%, #d8d8d4 100%),
    linear-gradient(170deg, #f2f1ef 0%, #e4e3e0 60%, #c8c7c4 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* Subtle floor line — gives depth like the room in the reference */
body::after {
  content: '';
  position: absolute;
  bottom: 18%;
  left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(180,175,170,.35) 20%, rgba(180,175,170,.35) 80%, transparent);
  pointer-events: none;
}

/*
  perspective: 480px  — strong depth effect
  perspective-origin: 68% 2%  — camera sits upper-right of scene,
    so cards recede toward the top-right as they go back in Z.
    This recreates the diagonal cascade from the reference image.
*/
#scene {
  position: relative;
  width: 100%; height: 100%;
  perspective: 580px;
  perspective-origin: 70% 1%;
  overflow: hidden;
}

/*
  Stack is anchored at 55% from the top so the active card (200px tall)
  occupies the bottom third of the scene and is fully visible.
  Back cards cascade upward — their translateY pulls them up in 3D,
  and the perspective + Z depth makes them appear smaller and higher
  on screen, with clear readable gaps between each card.
*/
#stack {
  transform-style: preserve-3d;
  position: absolute;
  top: 55%;
  left: 50%;
  margin-left: -160px; /* centre the 320px stack */
  width: 320px;
}

.card {
  position: absolute;
  top: 0; left: 0;
  width: 320px;
  background: rgba(255,255,255,0.97);
  border-radius: 18px;
  box-shadow: 0 10px 36px rgba(0,0,0,.15), 0 2px 8px rgba(0,0,0,.09);
  cursor: pointer;
  user-select: none;
  transform-origin: top center;
  will-change: transform, opacity;
  transition: transform .5s cubic-bezier(.34,1.56,.64,1), opacity .4s ease;
}

.card--bounce { animation: pop .42s ease forwards; }
@keyframes pop {
  0%   { transform: var(--t)                                   scale(1); }
  40%  { transform: var(--t) translateZ(24px) translateY(-5px) scale(1.04); }
  75%  { transform: var(--t) translateZ(-5px)                  scale(0.98); }
  100% { transform: var(--t)                                   scale(1); }
}

.card-header {
  display: flex; align-items: center; gap: 8px;
  padding: 11px 14px;
  border-bottom: 1px solid rgba(0,0,0,.06);
}
.card-icon     { font-size: 18px; line-height: 1; flex-shrink: 0; }
.card-scenario { font-size: 13px; font-weight: 700; color: #1c1c1e; }

.card-body {
  padding: 10px 14px 14px;
  display: flex; flex-direction: column; gap: 8px;
}
.msg-row       { display: flex; }
.msg-row--user { justify-content: flex-end; }

.bubble {
  padding: 8px 12px;
  border-radius: 16px;
  font-size: 13px; line-height: 1.4;
  max-width: 78%; word-break: break-word;
}
.bubble--user {
  background: #007AFF; color: #fff;
  border-bottom-right-radius: 4px;
}
.bubble--miri {
  background: #f0f0f5; color: #1c1c1e;
  border-bottom-left-radius: 4px;
  min-height: 30px;
}

.thinking {
  display: none; align-items: center; gap: 4px;
  background: #f0f0f5;
  border-radius: 16px; border-bottom-left-radius: 4px;
  padding: 8px 12px; width: fit-content;
}
.dot {
  width: 7px; height: 7px;
  background: #8e8e93; border-radius: 50%;
  animation: blink 1.2s infinite ease-in-out;
}
.dot:nth-child(2) { animation-delay: .2s; }
.dot:nth-child(3) { animation-delay: .4s; }
@keyframes blink {
  0%,60%,100% { opacity:.25; transform:scale(.8); }
  30%         { opacity:1;   transform:scale(1.1); }
}
.miri-row { display:flex; flex-direction:column; align-items:flex-start; gap:2px; }
.miri-name {
  font-size: 10px; font-weight: 700;
  color: #8e8e93; letter-spacing: .06em;
  text-transform: uppercase; padding-left: 2px;
}
</style>
</head>
<body>
<div id="scene"><div id="stack"></div></div>

<script>
(function () {
  const params  = new URLSearchParams(location.search);
  const lang    = params.get('lang')  || 'en';
  const isSmall = (params.get('size') || 'large') === 'small';

  const CHAR_MS  = isSmall ? 0   : 34;
  const SPEED    = isSmall ? 0.5 : 1.0;
  const THINK_MS = Math.round(1400 * SPEED);
  const DWELL_MS = Math.round(2000 * SPEED);
  const PAUSE_MS = isSmall ? 0   : 650;

  /*
    3D offsets per stack level (tuned for 480px perspective, stack anchored at top:55%):

    level 0 (active): translate3d(0,0,0)          → full size, bottom area
    level 1:          translate3d(18,-160,-160)    → 73% size, clearly above
    level 2:          translate3d(36,-320,-320)    → 60% size, partially visible at top

    The Y step (-160px) creates a 30-40px readable gap between cards on screen.
    The Z step (-160px) reduces each card to ~73% of the previous.
    Result: album-style stack where every card is readable.
  */
  /*
    Scale ratio per level in reference image ≈ 0.83.
    With perspective 580px: STEP_Z = 580 * (1/0.83 - 1) ≈ 118px.
    STEP_Y chosen so cards are visually separated (readable) after perspective projection.
    STEP_X creates the right-ward drift matching the reference image diagonal.
  */
  const STEP_X = isSmall ?  10 :  16;
  const STEP_Y = isSmall ? -90 : -148;
  const STEP_Z = isSmall ? -75 : -118;

  const scene = document.getElementById('scene');
  const stack = document.getElementById('stack');
  let items   = [];
  let maxV    = isSmall ? 2 : 3;

  const esc   = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const sleep = ms => new Promise(r => setTimeout(r, ms));
  const raf   = ()  => new Promise(r => requestAnimationFrame(r));

  async function typeText(el, text) {
    if (!CHAR_MS) { el.textContent = text; return; }
    for (const ch of text) { el.textContent += ch; await sleep(CHAR_MS); }
  }

  function slotT(i) {
    return `translate3d(${i * STEP_X}px,${i * STEP_Y}px,${i * STEP_Z}px)`;
  }

  function reposition() {
    items.forEach((el, i) => {
      const t = slotT(i);
      el.style.setProperty('--t', t);
      el.style.transform = t;
      el.style.opacity   = String(Math.max(0.52, 1 - i * 0.20));
      el.style.zIndex    = String(30 - i);
    });
  }

  function trim() {
    while (items.length > maxV) {
      const old = items.pop();
      old.style.transition = 'opacity .3s';
      old.style.opacity    = '0';
      setTimeout(() => old.remove(), 300);
    }
  }

  function buildCard(item) {
    const el = document.createElement('div');
    el.className = 'card';
    el.innerHTML = `
      <div class="card-header">
        <span class="card-icon">${esc(item.icon)}</span>
        <span class="card-scenario">${esc(item.scenario)}</span>
      </div>
      <div class="card-body">
        <div class="msg-row msg-row--user"><div class="bubble bubble--user"></div></div>
        <div class="thinking" style="display:none">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div class="miri-row">
          <div class="miri-name" style="display:none">Miri</div>
          <div class="bubble bubble--miri"></div>
        </div>
      </div>`;

    el.addEventListener('click', () => {
      el.classList.remove('card--bounce');
      void el.offsetWidth;
      el.classList.add('card--bounce');
      el.addEventListener('animationend', () => el.classList.remove('card--bounce'), { once: true });
    });
    return el;
  }

  async function showCard(item, instant) {
    const el = buildCard(item);
    const ub = el.querySelector('.bubble--user');
    const th = el.querySelector('.thinking');
    const mn = el.querySelector('.miri-name');
    const mb = el.querySelector('.bubble--miri');

    // Entry: start below & forward (large, off-screen below)
    el.style.transform  = `translate3d(0px, 80px, 200px)`;
    el.style.opacity    = '0';
    el.style.zIndex     = '99';
    el.style.transition = 'none';

    stack.appendChild(el);
    items.unshift(el);
    trim();

    await raf();

    if (instant) {
      ub.textContent   = item.user;
      mn.style.display = 'block';
      mb.textContent   = item.miri;
      reposition();
      return;
    }

    reposition();
    await sleep(560);

    await typeText(ub, item.user);
    await sleep(PAUSE_MS);

    th.style.display = 'inline-flex';
    await sleep(THINK_MS);
    th.style.display = 'none';

    mn.style.display = 'block';
    await typeText(mb, item.miri);

    await sleep(DWELL_MS);
  }

  async function run(cards) {
    await showCard(cards[0], true);
    let i = 1;
    while (true) { await showCard(cards[i++ % cards.length], false); }
  }

  fetch(`data/${lang}.json`)
    .then(r => r.json())
    .then(run)
    .catch(err => {
      stack.innerHTML = `<div style="padding:20px;color:#c00;font-size:13px;">
        Failed to load data/${lang}.json<br>${err.message}</div>`;
    });
})();
</script>
</body>
</html>
